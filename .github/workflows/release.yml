name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Build, test, and publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js 22.14.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.14.0'
          package-manager-cache: false

      - name: Upgrade npm to an OIDC-capable version (exact-pinned)
        run: |
          # MANUAL-BUMP: Dependabot does NOT track this run: literal (it scans uses: refs only).
          # Bump npm@11.18.0 by hand when a newer OIDC-capable npm ships. Floor-assert below guards correctness.
          npm install -g npm@11.18.0
          echo "npm version now: $(npm --version)"

      - name: Assert OIDC floors at runtime (npm >= 11.5.1, Node >= 22.14.0)
        run: |
          NPM_VERSION=$(npm --version)
          NODE_VERSION=$(node -p "process.versions.node")
          echo "npm: $NPM_VERSION  node: $NODE_VERSION"
          ge() { # ge VERSION FLOOR -> exit 0 if VERSION >= FLOOR (numeric, dotted)
            # WR-01 guard: reject any non-release runtime version (prerelease -rc/-nightly
            # or +build metadata). A non-[0-9.] char means it is not a clean X.Y.Z release,
            # so fail closed — never publish OIDC-attested on a prerelease toolchain. This
            # closes the sort -V prerelease-ordering hole rather than relying on the exact
            # node/npm pins to never present a prerelease (cross-model review, WR-01).
            case "$1" in *[!0-9.]*) return 1 ;; esac
            [ "$(printf '%s\n%s\n' "$2" "$1" | sort -V | head -n1)" = "$2" ]
          }
          ge "$NPM_VERSION" "11.5.1"  || { echo "::error::npm $NPM_VERSION is below the OIDC floor 11.5.1"; exit 1; }
          ge "$NODE_VERSION" "22.14.0" || { echo "::error::Node $NODE_VERSION is below the OIDC floor 22.14.0"; exit 1; }
          echo "OIDC floors satisfied."

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build all workspace packages
        run: npm run build

      - name: Run test suite
        run: npm test

      - name: Preflight — assert tag matches package versions
        run: |
          MCP_VERSION=$(node -p "require('./packages/mcp/package.json').version")
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "Tag: $GITHUB_REF_NAME  mcp: $MCP_VERSION  cli: $CLI_VERSION"
          if [ "$GITHUB_REF_NAME" != "v$MCP_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match mcp version v$MCP_VERSION"; exit 1
          fi
          if [ "$MCP_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::mcp ($MCP_VERSION) and cli ($CLI_VERSION) versions differ"; exit 1
          fi

      - name: Dry-run publish both packages (pack/manifest guard — NOT an auth check)
        run: |
          npm publish -w @localground/mcp --provenance --access public --dry-run
          npm publish -w @localground/cli --provenance --access public --dry-run

      - name: Publish @localground/mcp with provenance
        run: npm publish -w @localground/mcp --provenance --access public

      - name: Publish @localground/cli with provenance
        run: npm publish -w @localground/cli --provenance --access public

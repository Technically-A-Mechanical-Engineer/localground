name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        node-version: ['20.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build all workspace packages
        run: npm run build

      - name: Strict type check (tsc --build)
        run: npm run build:check

      - name: Verify tarball shape (npm pack + clean install)
        run: npm run verify:tarball

      - name: Run test suite
        run: npm test

  verify-pins:
    name: Verify action pins resolve to their tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify action pins (pinact run --verify --check)
        shell: bash
        run: |
          go install github.com/suzuki-shunsuke/pinact/v4/cmd/pinact@v4.1.0
          "$(go env GOPATH)/bin/pinact" run --verify --check
        env:
          GITHUB_TOKEN: ${{ github.token }}
